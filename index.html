<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang</title>
    <style>
        /* Định dạng cơ bản cho toàn bộ trang */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        /* Hiệu ứng chữ 404 cực lớn */
        h1 {
            font-size: 15rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: -10px;
            color: #212529;
            text-shadow: 10px 10px 0px #dee2e6;
        }

        /* Thông báo lỗi */
        h2 {
            font-size: 2rem;
            margin: -20px 0 20px 0;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            color: #6c757d;
            margin-bottom: 30px;
        }

        /* Nút quay lại trang chủ */
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .btn-home:hover {
            background-color: #0056b3;
        }

        /* Hiệu ứng mượt mà khi tải trang */
        .container {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Điều chỉnh cho màn hình nhỏ */
        @media (max-width: 600px) {
            h1 { font-size: 8rem; letter-spacing: -5px; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Rất tiếc! Không tìm thấy trang</h2>
        <p>Có vẻ như đường dẫn bạn đang truy cập không tồn tại hoặc đã bị di chuyển.</p>
        <a href="/" class="btn-home">Quay về Trang Chủ</a>
    </div>

</body>
</html>
